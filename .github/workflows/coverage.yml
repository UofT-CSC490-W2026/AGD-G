name: Python Coverage

on:
  pull_request:
    paths:
      - ".github/workflows/coverage.yml"
      - ".github/scripts/update_readme_coverage.py"
      - "README.md"
      - "pyproject.toml"
      - "src/agdg/**"
      - "modal_run/**"
      - "tests/**"
  push:
    paths:
      - ".github/workflows/coverage.yml"
      - ".github/scripts/update_readme_coverage.py"
      - "README.md"
      - "pyproject.toml"
      - "src/agdg/**"
      - "modal_run/**"
      - "tests/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  python-coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .

      - name: Run modal tests with coverage
        run: |
          pytest \
            --cov=modal_run
          mv .coverage .coverage.modal

      - name: Run AGD tests with coverage
        run: |
          pytest \
            --cov=agdg
          mv .coverage .coverage.agdg

      - name: Coverage report
        run: |
          python -m coverage combine .coverage.modal .coverage.agdg
          python -m coverage report -m
          python -m coverage xml -o coverage.xml
          python -m coverage json -o coverage.json
          python -m coverage report -m --format=markdown > coverage.md
          cat coverage.md >> $GITHUB_STEP_SUMMARY

      - name: Update README coverage blocks
        run: |
          python .github/scripts/update_readme_coverage.py project coverage.json README.md

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: |
            coverage.json
            coverage.xml
            coverage.md

      - name: Commit README update on default branch
        if: github.event_name == 'push' && github.ref_name == github.event.repository.default_branch
        run: |
          if git diff --quiet README.md; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: update python coverage"
          git push

      - name: Comment coverage on pull request
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const body = [
              "<!-- python-coverage-comment -->",
              "## Python Coverage",
              "",
              fs.readFileSync("coverage.md", "utf8"),
            ].join("\n");
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });
            const existing = comments.find((comment) =>
              comment.body.includes("<!-- python-coverage-comment -->")
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
