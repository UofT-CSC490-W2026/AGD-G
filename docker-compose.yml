services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: agdg
      POSTGRES_PASSWORD: agdg
      POSTGRES_DB: agdg
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/agdg/data_pipeline/aws/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agdg"]
      interval: 5s
      retries: 5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      retries: 5

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/agdg-local &&
      echo 'Bucket agdg-local created'
      "

  agdg:
    build: .
    env_file: .env.local
    environment:
      AGDG_DB_HOST: postgres
      AGDG_S3_ENDPOINT: http://minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    profiles:
      - app

volumes:
  pgdata:
  miniodata:
